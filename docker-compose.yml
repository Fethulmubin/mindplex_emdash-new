services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindplex
      POSTGRES_USER: mindplex
      POSTGRES_PASSWORD: mindplex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindplex -d mindplex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: